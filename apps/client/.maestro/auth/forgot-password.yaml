appId: com.example.app
name: "Auth - Forgot Password"
---
- launchApp:
    clearState: true

# Navigate to forgot password from sign-in
- assertVisible: "Welcome back"
- tapOn: "Forgot password?"

# Should see forgot password screen
- assertVisible: "Reset your password"
- assertVisible: "Email"
- assertVisible: "Send Reset Link"

# Try submitting empty form
- tapOn: "Send Reset Link"
- assertVisible: "Email is required"

# Navigate back to sign-in
- assertVisible: "Remembered your password?"
- tapOn: "Sign In"
- assertVisible: "Welcome back"
