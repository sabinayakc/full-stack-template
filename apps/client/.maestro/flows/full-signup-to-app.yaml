appId: com.example.app
name: "E2E - Full Sign Up to App"
tags:
  - e2e
  - auth
  - onboarding
---
# Full end-to-end flow: Sign Up -> Onboarding -> Main App
# Uses a unique email per run to avoid conflicts.
#
# Prerequisites:
#   - Server running with E2E_AUTO_VERIFY=true

- runScript:
    file: ../helpers/test-data.js

- launchApp:
    clearState: false

- runFlow:
    file: ../shared/signup.yaml
    env:
      NAME: "${output.uniqueName}"
      EMAIL: "${output.uniqueEmail}"

- runFlow:
    file: ../shared/onboarding-complete.yaml
    env:
      ORG_NAME: "${output.orgName}"
